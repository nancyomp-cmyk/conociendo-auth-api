# =====================================================
# Configuraci\u00f3n de la aplicaci\u00f3n auth-api
# Proyecto: Conociendo.com
# Evidencia: GA7-220501096-AA5-EV01
# =====================================================

# Puerto donde corre el servicio web
server.port=8081

# Prefijo base de todos los endpoints
server.servlet.context-path=/api

# --- Base de datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/conociendo_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# update: crea/actualiza tablas autom\u00e1ticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# --- Logs ---
logging.level.com.conociendo=DEBUG